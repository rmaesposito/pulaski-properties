<title>Pulaski Properties</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --bg: #f1f5f9;
  --surface: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --radius: 12px;
  --fav: #f59e0b;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}
.header {
  background: var(--primary);
  color: white;
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 17px; font-weight: 600; }
.header .subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-actions { display: flex; gap: 8px; }
.header-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 34px; height: 34px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-btn.active { background: rgba(255,255,255,0.4); }

.filter-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  transition: max-height 0.3s ease;
  max-height: 400px;
}
.filter-panel.collapsed { max-height: 0; border-bottom: none; }

.search-section { padding: 10px 16px; position: relative; }
.search-input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--bg);
  outline: none;
}
.search-input:focus { border-color: var(--primary); }
.search-icon { position: absolute; left: 28px; top: 20px; color: var(--text-muted); }

.filter-section { padding: 4px 16px 8px; }
.filter-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; min-width: 55px; flex-shrink: 0; }
.filter-pill {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 11px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

.sort-bar {
  padding: 6px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}
.sort-bar::-webkit-scrollbar { display: none; }
.sort-btn {
  padding: 4px 10px;
  border-radius: 16px;
  font-size: 11px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.sort-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

.filter-active-bar {
  padding: 6px 16px;
  background: var(--primary-light);
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--primary);
}
.filter-active-bar.show { display: flex; }
.clear-filters { margin-left: auto; font-weight: 600; cursor: pointer; text-decoration: underline; }

.cards-container { padding: 12px 16px; }
.card {
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

.card-image-wrap { position: relative; width: 100%; height: 180px; background: var(--bg); }
.card-image { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-image-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 32px;
  background: linear-gradient(135deg, #e2e8f0, #f1f5f9);
}

/* Favorite star */
.fav-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  z-index: 5;
  transition: all 0.15s;
}
.fav-btn.favorited { color: var(--fav); }
.fav-btn:active { transform: scale(0.9); }

.card-header {
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-type {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px;
  background: var(--primary-light); color: var(--primary);
}
.card-type.comercial { background: #fef3c7; color: #d97706; }
.card-type.terreno { background: #d1fae5; color: #059669; }
.card-type.galpao { background: #ede9fe; color: #7c3aed; }
.card-type.posto { background: #fee2e2; color: #dc2626; }
.card-sale { font-size: 12px; color: var(--text-muted); font-weight: 500; }

.card-body { padding: 10px 16px; }
.card-address { font-size: 14px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; }
.card-owner { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

.card-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.metric { text-align: center; padding: 6px 4px; background: var(--bg); border-radius: 6px; }
.metric-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.02em; }
.metric-value { font-size: 13px; font-weight: 700; color: var(--text); }

.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--bg); color: var(--text-secondary); }
.tag.priority-p0 { background: #fee2e2; color: #dc2626; font-weight: 600; }
.tag.priority-p1 { background: #fef3c7; color: #d97706; font-weight: 600; }
.tag.priority-p2 { background: #dbeafe; color: #2563eb; }

.card-links {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.link-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
  text-decoration: none; color: var(--primary);
  background: var(--surface); border: 1px solid var(--border); cursor: pointer;
}

.card-comments {
  padding: 8px 16px; font-size: 12px;
  color: var(--text-secondary); font-style: italic;
  border-top: 1px solid var(--border);
}

.card-notes-section { padding: 8px 16px 12px; border-top: 1px solid var(--border); }
.notes-toggle { font-size: 12px; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 4px; font-weight: 500; }
.notes-panel { display: none; margin-top: 8px; }
.notes-panel.open { display: block; }
.notes-textarea { width: 100%; min-height: 60px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; resize: vertical; font-family: inherit; }
.notes-save-btn { margin-top: 6px; padding: 6px 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; }
.photos-section { margin-top: 8px; }
.photos-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.photo-thumb { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
.add-photo-btn { width: 60px; height: 60px; border-radius: 6px; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; font-size: 20px; }
.photo-input { display: none; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-state i { font-size: 48px; margin-bottom: 12px; display: block; }

.photo-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
.photo-modal.open { display: flex; }
.photo-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
.photo-modal-close { position: absolute; top: 16px; right: 16px; color: white; font-size: 24px; cursor: pointer; }
</style>
</head>

<div class="header">
  <div>
    <h1><i class="fa-solid fa-house-chimney"></i> Pulaski Properties</h1>
    <div class="subtitle" id="countDisplay">49 properties</div>
  </div>
  <div class="header-actions">
    <button class="header-btn" id="favFilterBtn" onclick="toggleFavFilter()" title="Show favorites only">
      <i class="fa-solid fa-star"></i>
    </button>
    <button class="header-btn" id="filterToggle" onclick="toggleFilterPanel()">
      <i class="fa-solid fa-sliders"></i>
    </button>
  </div>
</div>

<div class="filter-panel" id="filterPanel">
  <div class="search-section">
    <i class="fa-solid fa-search search-icon"></i>
    <input type="text" class="search-input" id="searchInput" placeholder="Search address, owner, sale#...">
  </div>
  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">Type</span>
      <div id="typeFilters" style="display:flex;gap:6px;overflow-x:auto;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Visitar</span>
      <div id="visitarFilters" style="display:flex;gap:6px;overflow-x:auto;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Priorid.</span>
      <div id="prioridadeFilters" style="display:flex;gap:6px;overflow-x:auto;"></div>
    </div>
  </div>
  <div class="sort-bar">
    <span style="font-size:10px;color:var(--text-muted);font-weight:700;">SORT:</span>
    <button class="sort-btn active" data-sort="sale_num">Sale#</button>
    <button class="sort-btn" data-sort="divida">Dívida</button>
    <button class="sort-btn" data-sort="county_value">County Value</button>
    <button class="sort-btn" data-sort="market_estimate">Market Est.</button>
    <button class="sort-btn" data-sort="visita_prioridade">Prioridade</button>
  </div>
</div>

<div class="filter-active-bar" id="activeFilterBar">
  <i class="fa-solid fa-filter"></i>
  <span id="activeFilterText">Filtered</span>
  <span class="clear-filters" onclick="clearAllFilters()">Clear all</span>
</div>

<div class="cards-container" id="cardsContainer"></div>

<div class="photo-modal" id="photoModal" onclick="closePhotoModal()">
  <span class="photo-modal-close"><i class="fa-solid fa-xmark"></i></span>
  <img id="photoModalImg" src="">
</div>

function getStorageKey(id) { return 'pulaski_prop_' + id; }
function getPropertyData(id) {
  try { return JSON.parse(localStorage.getItem(getStorageKey(id))) || {}; } catch(e) { return {}; }
}
function savePropertyData(id, data) { localStorage.setItem(getStorageKey(id), JSON.stringify(data)); }

let filters = { type: '', visitar: '', prioridade: '' };
let sortField = 'sale_num';
let sortDir = 1;
let searchQuery = '';
let panelOpen = true;
let showFavsOnly = false;

function toggleFilterPanel() {
  panelOpen = !panelOpen;
  document.getElementById('filterPanel').classList.toggle('collapsed', !panelOpen);
}
function toggleFavFilter() {
  showFavsOnly = !showFavsOnly;
  document.getElementById('favFilterBtn').classList.toggle('active', showFavsOnly);
  renderCards();
}

function updateActiveFilterBar() {
  const active = [];
  if (filters.type) active.push(filters.type);
  if (filters.visitar) active.push(filters.visitar);
  if (filters.prioridade) active.push(filters.prioridade);
  if (searchQuery) active.push('"' + searchQuery + '"');
  if (showFavsOnly) active.push('★ Favorites');
  const bar = document.getElementById('activeFilterBar');
  if (active.length > 0) { bar.classList.add('show'); document.getElementById('activeFilterText').textContent = active.join(' • '); }
  else { bar.classList.remove('show'); }
}

function clearAllFilters() {
  filters = { type: '', visitar: '', prioridade: '' };
  searchQuery = '';
  showFavsOnly = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('favFilterBtn').classList.remove('active');
  buildFilters(); renderCards();
}

function buildFilters() {
  const types = [...new Set(DATA.map(d => d.type).filter(Boolean))].sort();
  const visitars = [...new Set(DATA.map(d => d.visitar).filter(Boolean))].sort();
  const prioridades = [...new Set(DATA.map(d => d.visita_prioridade).filter(Boolean))].sort();
  renderPills('typeFilters', types, 'type');
  renderPills('visitarFilters', visitars, 'visitar');
  renderPills('prioridadeFilters', prioridades, 'prioridade');
}

function renderPills(containerId, values, filterKey) {
  const container = document.getElementById(containerId);
  let html = '<span class="filter-pill ' + (filters[filterKey] === '' ? 'active' : '') + '" onclick="setFilter(\''+filterKey+'\',\'\')">All</span>';
  values.forEach(v => {
    const escaped = v.replace(/'/g, "\\'");
    html += '<span class="filter-pill ' + (filters[filterKey] === v ? 'active' : '') + '" onclick="setFilter(\''+filterKey+'\',\''+escaped+'\')">' + v + '</span>';
  });
  container.innerHTML = html;
}

function setFilter(key, value) { filters[key] = value; buildFilters(); renderCards(); }

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const field = this.dataset.sort;
    if (sortField === field) sortDir *= -1;
    else { sortField = field; sortDir = 1; }
    document.querySelectorAll('.sort-btn').forEach(b => { b.classList.remove('active'); b.textContent = b.textContent.replace(/ [↑↓]/, ''); });
    this.classList.add('active');
    this.textContent = this.textContent + (sortDir === 1 ? ' ↑' : ' ↓');
    renderCards();
  });
});

document.getElementById('searchInput').addEventListener('input', function() { searchQuery = this.value.toLowerCase(); renderCards(); });

function formatCurrency(val) { if (!val) return '$0'; return '$' + Math.round(val).toLocaleString(); }
function getTypeClass(type) { const t = type.toLowerCase(); if (t.includes('comercial')) return 'comercial'; if (t.includes('terreno')) return 'terreno'; if (t.includes('galp')) return 'galpao'; if (t.includes('posto')) return 'posto'; return ''; }
function getPriorityClass(p) { if (p === 'P0') return 'priority-p0'; if (p === 'P1') return 'priority-p1'; if (p === 'P2') return 'priority-p2'; return ''; }

function toggleFav(id, event) {
  event.stopPropagation();
  const data = getPropertyData(id);
  data.favorite = !data.favorite;
  savePropertyData(id, data);
  const btn = document.getElementById('fav-' + id);
  btn.classList.toggle('favorited', data.favorite);
  btn.innerHTML = data.favorite ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
}

function renderCards() {
  updateActiveFilterBar();
  let filtered = DATA.filter(d => {
    if (filters.type && d.type !== filters.type) return false;
    if (filters.visitar && d.visitar !== filters.visitar) return false;
    if (filters.prioridade && d.visita_prioridade !== filters.prioridade) return false;
    if (showFavsOnly) { const pd = getPropertyData(d.id); if (!pd.favorite) return false; }
    if (searchQuery) {
      const searchable = (d.address + ' ' + d.owner + ' ' + d.sale_num + ' ' + d.comments).toLowerCase();
      if (!searchable.includes(searchQuery)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let av = a[sortField], bv = b[sortField];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return 0;
  });

  document.getElementById('countDisplay').textContent = filtered.length + ' of ' + DATA.length + ' properties';
  const container = document.getElementById('cardsContainer');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-magnifying-glass"></i><p>No properties match your filters</p></div>';
    return;
  }

  container.innerHTML = filtered.map(d => {
    const stored = getPropertyData(d.id);
    const savedNotes = stored.notes || '';
    const savedPhotos = stored.photos || [];
    const isFav = stored.favorite || false;
    const hasNotes = savedNotes || savedPhotos.length;

    const imageHtml = d.image
      ? '<img class="card-image" src="' + d.image + '" loading="lazy">'
      : '<div class="card-image-placeholder"><i class="fa-solid fa-image"></i></div>';

    return '<div class="card">' +
      '<div class="card-image-wrap">' + imageHtml +
        '<button class="fav-btn ' + (isFav ? 'favorited' : '') + '" id="fav-' + d.id + '" onclick="toggleFav(' + d.id + ', event)">' +
          '<i class="fa-' + (isFav ? 'solid' : 'regular') + ' fa-star"></i>' +
        '</button>' +
      '</div>' +
      '<div class="card-header">' +
        '<span class="card-type ' + getTypeClass(d.type) + '">' + d.type + '</span>' +
        '<span class="card-sale">Sale #' + d.sale_num + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-address">' + d.address + '</div>' +
        '<div class="card-owner"><i class="fa-solid fa-user"></i> ' + d.owner + '</div>' +
        '<div class="card-metrics">' +
          '<div class="metric"><div class="metric-label">Dívida</div><div class="metric-value">' + formatCurrency(d.divida) + '</div></div>' +
          '<div class="metric"><div class="metric-label">County</div><div class="metric-value">' + formatCurrency(d.county_value) + '</div></div>' +
          '<div class="metric"><div class="metric-label">Market</div><div class="metric-value">' + formatCurrency(d.market_estimate) + '</div></div>' +
        '</div>' +
        '<div class="card-tags">' +
          (d.visita_prioridade ? '<span class="tag ' + getPriorityClass(d.visita_prioridade) + '">' + d.visita_prioridade + '</span>' : '') +
          (d.visitar ? '<span class="tag">' + d.visitar + '</span>' : '') +
          (d.flood_factor ? '<span class="tag">Flood: ' + d.flood_factor + '</span>' : '') +
          (d.building_sqft ? '<span class="tag">' + d.building_sqft + ' sqft</span>' : '') +
        '</div>' +
      '</div>' +
      (d.comments ? '<div class="card-comments">' + d.comments + '</div>' : '') +
      '<div class="card-links">' +
        (d.zillow ? '<a href="' + d.zillow + '" target="_blank" class="link-btn"><i class="fa-solid fa-house"></i> Zillow</a>' : '') +
        (d.tax_url ? '<a href="' + d.tax_url + '" target="_blank" class="link-btn"><i class="fa-solid fa-file-invoice-dollar"></i> Tax</a>' : '') +
        (d.google_maps ? '<a href="' + d.google_maps + '" target="_blank" class="link-btn"><i class="fa-solid fa-map-location-dot"></i> Maps</a>' : '') +
        (d.firststreet_url ? '<a href="' + d.firststreet_url + '" target="_blank" class="link-btn"><i class="fa-solid fa-water"></i> Flood</a>' : '') +
      '</div>' +
      '<div class="card-notes-section">' +
        '<div class="notes-toggle" onclick="toggleNotes(' + d.id + ')">' +
          '<i class="fa-solid fa-pen"></i> Notes & Photos ' + (hasNotes ? '<span style="color:var(--success)"> ●</span>' : '') +
        '</div>' +
        '<div class="notes-panel" id="notes-' + d.id + '">' +
          '<textarea class="notes-textarea" id="textarea-' + d.id + '" placeholder="Add your notes...">' + savedNotes + '</textarea>' +
          '<button class="notes-save-btn" onclick="saveNotes(' + d.id + ', this)"><i class="fa-solid fa-check"></i> Save Note</button>' +
          '<div class="photos-section">' +
            '<div class="photos-grid" id="photos-' + d.id + '">' +
              savedPhotos.map(function(p) { return '<img class="photo-thumb" src="' + p + '" onclick="showPhoto(this.src, event)">'; }).join('') +
              '<label class="add-photo-btn"><i class="fa-solid fa-camera"></i><input type="file" class="photo-input" accept="image/*" capture="environment" onchange="addPhoto(' + d.id + ', this)"></label>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleNotes(id) { document.getElementById('notes-' + id).classList.toggle('open'); }
function saveNotes(id, btn) {
  const text = document.getElementById('textarea-' + id).value;
  const data = getPropertyData(id);
  data.notes = text;
  savePropertyData(id, data);
  btn.innerHTML = '<i class="fa-solid fa-check"></i> Saved!';
  setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-check"></i> Save Note'; }, 1500);
}

function addPhoto(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = getPropertyData(id);
    if (!data.photos) data.photos = [];
    data.photos.push(e.target.result);
    savePropertyData(id, data);
    const grid = document.getElementById('photos-' + id);
    const img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = e.target.result;
    img.onclick = function(ev) { showPhoto(this.src, ev); };
    grid.insertBefore(img, grid.lastElementChild);
  };
  reader.readAsDataURL(file);
}

function showPhoto(src, ev) {
  if (ev) ev.stopPropagation();
  document.getElementById('photoModalImg').src = src;
  document.getElementById('photoModal').classList.add('open');
}
function closePhotoModal() { document.getElementById('photoModal').classList.remove('open'); }

buildFilters();
renderCards();
</script>

</body></html>
